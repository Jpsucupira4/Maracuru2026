<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - 2ª Edição Maracuru</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <a href="index.html" title="Voltar ao Início">
            <img src="img/2maracuru.png" alt="Maracuru 2ª Edição" class="logo-header">
        </a>
    </header>

    <section id="countdown-section">
        <div class="container">
            <h2 id="dataAutomatica">Carregando data...</h2>
            <div id="countdown-timer">
                <div class="time-card"><span id="days">00</span><small>Dias</small></div>
                <div class="time-card"><span id="hours">00</span><small>Horas</small></div>
                <div class="time-card"><span id="minutes">00</span><small>Min</small></div>
                <div class="time-card"><span id="seconds">00</span><small>Seg</small></div>
            </div>
        </div>
    </section>

    <section class="form-container">
        <form id="registrationForm">
            
            <fieldset>
                <legend>1. Dados do Condutor</legend>
                <div class="input-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" required placeholder="Ex: João Silva">
                </div>
                
                <div class="input-row">
                    <div class="input-group">
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" required placeholder="000.000.000-00">
                    </div>
                    <div class="input-group">
                        <label for="nascimento">Data de Nascimento:</label>
                        <input type="date" id="nascimento" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="telefone">WhatsApp:</label>
                    <input type="tel" id="telefone" required placeholder="(85) 98888-8888">
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Veículo & Percurso</legend>
                <div class="input-group">
                    <label for="veiculo">Modelo do Veículo:</label>
                    <input type="text" id="veiculo" required placeholder="Ex: Troller T4, Jeep Renegade">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="placa">Placa (Opcional):</label>
                        <input type="text" id="placa" placeholder="Letras e Números">
                    </div>
                    <div class="input-group">
                        <label for="ano">Ano (Opcional):</label>
                        <input type="number" id="ano" placeholder="Ex: 2022">
                    </div>
                </div>

                <div class="input-group">
                    <label for="rota">Selecione sua Rota:</label>
                    <select id="rota" required>
                        <option value="">Clique para escolher...</option>
                        <option value="Maracuru Light">Maracuru Light (Fácil/Intermediário)</option>
                        <option value="Maracuru Hard">Maracuru Hard (Intermediário/Avançado)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Possui rádio de comunicação?</label>
                    <div style="display: flex; gap: 20px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="radio_com" value="Sim" style="width: auto;"> Sim
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="radio_com" value="Não" style="width: auto;" checked> Não
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="zequinhas">Quantidade de acompanhantes (Zequinhas):</label>
                    <input type="number" id="zequinhas" value="1" min="0">
                </div>
            </fieldset>

            <fieldset>
                <legend>3. Pedido de Camisas</legend>
                <div class="input-row">
                    <div class="input-group">
                        <label for="qtd_camisetas">Quantidade de blusas:</label>
                        <input type="number" id="qtd_camisetas" value="2" min="1">
                    </div>
                    <div class="input-group">
                        <label for="tamanhos_camisetas">Tamanhos (especifique):</label>
                        <input type="text" id="tamanhos_camisetas" required placeholder="Ex: 1-G, 1-P">
                    </div>
                </div>
            </fieldset>

            <button type="submit" id="btnEnviar" class="btn-principal" style="width: 100%;">
                CONCLUIR INSCRIÇÃO E GERAR PDF
            </button>
        </form>
    </section>

    <footer>
        <p>© 2026 Maranguape Off Road - MPE OFFROAD</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
