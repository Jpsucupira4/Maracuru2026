<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrição - 2ª Edição Maracuru</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <a href="index.html"><img src="img/mpeoffroad.png" class="logo-header" /></a>
    </header>

    <section id="countdown-section">
      <div class="container">
        <h2 id="dataAutomatica">22 e 23 de Maio de 2026</h2>
        <div id="countdown-timer">
          <div class="time-card">
            <span id="days">00</span><small>Dias</small>
          </div>
          <div class="time-card">
            <span id="hours">00</span><small>Horas</small>
          </div>
          <div class="time-card">
            <span id="minutes">00</span><small>Min</small>
          </div>
          <div class="time-card">
            <span id="seconds">00</span><small>Seg</small>
          </div>
        </div>
      </div>
    </section>

    <section class="form-container">
      <form id="registrationForm">
        <fieldset>
          <legend>1. Dados do Condutor</legend>
          <div class="input-group">
            <label>Nome Completo:</label>
            <input type="text" id="nome" required />
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>CPF:</label>
              <input
                type="text"
                id="cpf"
                required
                placeholder="000.000.000-00"
              />
            </div>
            <div class="input-group">
              <label>Data de Nascimento:</label>
              <input type="date" id="nascimento" required />
            </div>
          </div>
          <div class="input-group">
            <label>WhatsApp:</label>
            <input
              type="tel"
              id="telefone"
              required
              placeholder="(85) 90000-0000"
            />
          </div>
        </fieldset>

        <fieldset>
          <legend>2. Dados do Veículo</legend>
            <div class="input-group">
            <label>Modelo:</label>
            <input type="text" id="veiculo" required />
          </div>
         </div>
          <div class="input-row">
            <div class="input-group">
              <label>Placa:</label>
              <input type="text" id="placa" />
            </div>
            <div class="input-group">
              <label>Ano:</label>
              <input type="number" id="ano" />
            </div>
          </div>
          <div class="input-group">
            <label>Possui rádio de comunicação?</label>
            <div style="display: flex; gap: 20px; margin-top: 10px">
              <label
                ><input type="radio" name="radio_com" value="Sim" /> Sim</label
              >
              <label
                ><input type="radio" name="radio_com" value="Não" checked />
                Não</label
              >
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. Modalidade e Adicionais</legend>
          <div class="input-group">
            <label>Rota Desejada:</label>
            <select id="rota" required>
              <option value="Maracuru Light">Maracuru Light</option>
              <option value="Maracuru Hard">Maracuru Hard</option>
            </select>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>Zequinhas (Qtd):</label>
              <input type="number" id="zequinhas" value="0" />
            </div>
            <div class="input-group">
              <label>Tamanho Camisetas:</label>
              <input
                type="text"
                id="tamanhos_camisetas"
                placeholder="Ex: 1-G, 1-M"
                />  
          </div>
          <div class="input-group">
            <label>Forma de Pagamento:</label>
            <select id="metodo_pagamento" required>
                <option value="lote1_avista" class="lote1">À Vista / PIX (R$ 250,00)</option>
        <option value="lote1_2x" class="lote1">Cartão / 2x (R$ 280,00)</option>
        
        <option value="lote2_avista" class="lote2" style="display:none;">À Vista (R$ 300,00)</option>
        <option value="lote2_2x" class="lote2" style="display:none;">Cartão / 2x de R$ 150,00 (R$ 300,00)</option>
    </select>
</div>
</div>
</div>
              />
            </div>
          </div>
        </fieldset>

        <button
          type="submit"
          id="btnEnviar"
          class="btn-principal"
          style="width: 100%"
        >
          CONCLUIR INSCRIÇÃO NO WHATSAPP
        </button>
      </form>
    </section>

    <script src="script.js"></script>
  </body>
</html>
